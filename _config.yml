# About Section
about_profile_image: images/profile.png
about_content: |
  <div class="slogan-container">
    <span class="quote-mark">“</span>
      <span class="slogan-text">애플리케이션 아키텍처와 트래픽 흐름을 완벽히 이해하는 클라우드 엔지니어</span>
    <span class="quote-mark">”</span>
  </div>

  인프라의 껍데기만 구축하는 것이 아니라, 그 위에서 구동되는 서비스의 맥락과 데이터 흐름을 입체적으로 이해하고 고가용성 클라우드 환경을 설계하는 플랫폼 엔지니어입니다.

  온프레미스 환경에서 <b>kubeadm으로 쿠버네티스 클러스터를 직접 구축</b>하며 컨테이너 네트워크의 하부 레이어를 깊이 파고들었고, Terraform을 활용한 <b>인프라 코드화(IaC)</b>를 지향합니다. 대규모 트래픽 분산과 데이터 정합성을 위한 Kafka, Redis 중심의 분산 아키텍처에 강점이 있습니다.

  인프라의 장애가 비즈니스에 미치는 영향을 백엔드 레벨에서부터 추적할 수 있으며, Prometheus와 Grafana를 통한 <b>관측 가능성(Observability)</b>을 확보하여 트래픽 스파이크 및 병목 현상에 선제적으로 트러블슈팅합니다.

  지금까지 마주한 인프라 및 아키텍처 시행착오를 <b>250여 건의 기술 포스트</b>로 기록해 왔으며, 이러한 '지식의 자산화'를 바탕으로 팀의 인프라 안정성을 이끄는 엔지니어로 성장하고 있습니다.

