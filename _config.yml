# About Section
about_profile_image: images/profile.png
about_content: |
  <div class="slogan-container">
    <span class="quote-mark">“</span>
      <span class="slogan-text">애플리케이션과 인프라를 함께 이해하는 클라우드 엔지니어</span>
    <span class="quote-mark">”</span>
  </div>

  서비스의 데이터 흐름과 애플리케이션 아키텍처를 이해하고, 이를 바탕으로 안정적이고 확장 가능한 클라우드 플랫폼을 설계·운영하는 엔지니어를 지향합니다.
  
  Terraform으로 AWS 멀티 AZ 인프라와 Amazon EKS 환경을 구축하며 IaC 및 컨테이너 오케스트레이션 역량을 쌓았고, Kafka·Redis 기반 분산 시스템을 구성하며 서비스와 인프라를 함께 바라보는 시야를 넓혀왔습니다.
  
  특히 구축한 시스템을 안정적으로 운영하기 위해 k6 부하 테스트와 Prometheus·Grafana 기반 모니터링 체계를 직접 설계했습니다. 이를 통해 시스템 병목 구간을 분석하고 개선하며, GitOps 기반 자동화와 Observability 향상에 지속적으로 관심을 가지고 있습니다.
  
  이 모든 학습 여정을 기록하기 위해 지금까지 250건 이상의 기술 블로그를 운영하며, 꾸준히 성장하는 엔지니어의 증거를 남기고 있습니다.



