# About Section
about_profile_image: images/profile.png
about_content: |
  <div class="slogan-container">
    <span class="quote-mark">“</span>
      <span class="slogan-text">애플리케이션 아키텍처와 트래픽 흐름을 완벽히 이해하는 클라우드 엔지니어</span>
    <span class="quote-mark">”</span>
  </div>

  서비스의 맥락과 데이터 흐름을 이해한 상태에서 안정적이고 확장 가능한 클라우드 인프라를 설계·운영하는 **클라우드 및 플랫폼 엔지니어**를 지향하고 있습니다.

  Terraform을 활용한 **인프라 코드화(IaC)**를 기반으로 **AWS 멀티 AZ 환경의 3-Tier 아키텍처**와 **Amazon EKS 기반 Kubernetes 환경**을 구축하였으며, 온프레미스 환경에서는 **kubeadm을 활용한 Kubernetes 클러스터**를 직접 구성하며 컨테이너 네트워크와 클러스터 운영 원리를 학습했습니다.

  또한 **Kafka와 Redis를 활용한 분산 시스템 아키텍처**를 구현하며 서비스 레벨의 데이터 흐름과 인프라 구조를 함께 이해하고자 노력했습니다. 단순히 인프라를 구축하는 것에 그치지 않고 **k6 기반 부하 테스트**를 수행하여 시스템의 한계를 측정하고, **Prometheus와 Grafana 기반의 Observability 환경**을 구축하여 병목 지점을 분석하고 개선한 경험이 있습니다.

  안정적인 서비스 운영을 위해 **GitOps 기반 배포 자동화**와 운영 효율성 향상에 관심을 가지고 있으며, 지금까지 **250여 건 이상의 기술 포스트**를 작성하며 인프라 구축 과정에서 얻은 경험과 트러블슈팅 사례를 기록하고 공유하고 있습니다.

  지속적인 학습과 자동화를 통해 안정적인 클라우드 플랫폼을 구축하고 운영할 수 있는 **인프라 엔지니어**로 성장하는 것이 목표입니다.


