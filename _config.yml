# About Section
about_profile_image: images/profile.png
about_content: |
  <div class="slogan-container">
    <span class="quote-mark">“</span>
      <span class="slogan-text">인프라 자동화와 운영 효율을 추구하는 클라우드 엔지니어</span>
    <span class="quote-mark">”</span>
  </div>

  서비스의 비즈니스 데이터 흐름뿐만 아니라, 백엔드가 구동되는 가상 네트워크와 인프라의 내부 원리까지 명확히 이해하고 아키텍처를 설계하는 개발자를 지향합니다.

  Terraform을 활용하여 AWS 멀티 가용 영역(AZ) 및 VPC Interface Endpoint 기반의 폐쇄망 보안 인프라를 Bottom-Up으로 직접 구축하며 인프라를 코드화(IaC)하는 역량을 다졌습니다. 이를 기반으로 Amazon EKS 노드에 Bastion Host 없이 SSM Session Manager로 안전하게 접근하는 보안 표준을 수립했습니다.

  단순히 기능을 배포하는 것에 그치지 않고, 부하 테스트와 Prometheus·Grafana 기반의 모니터링 체계를 연동하여 시스템 병목 구간과 아키텍처적 레이스 컨디션을 정량적 지표로 식별하고 예방하는 데 집중합니다. 수험생의 학습 흐름을 끊지 않는 무결한 서비스를 위해 GitOps 기반의 자동화와 가시성(Observability) 확보를 끊임없이 고민합니다.

  이 모든 집요한 트러블슈팅 과정과 기술적 성장의 증거를 공유하기 위해, 현재까지 250편 이상의 기술 글을 기록하며 견고한 지식 자산을 축적해 나가고 있습니다.

